<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASSIKI SERVICES - Recrutement personnel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a4a6f',
            secondary: '#0f2b3d',
            accent: '#e67e22',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #f3f4f6; }
    .btn-submit { transition: all 0.3s ease; }
    .btn-submit:hover { transform: scale(1.02); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15); }
  </style>
</head>
<body class="font-sans">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">
    
    <div class="bg-gradient-to-r from-primary to-secondary p-5 text-white">
      <div class="flex items-center gap-3 mb-2">
        <i class="fas fa-handshake text-2xl text-accent"></i>
        <h1 class="text-xl font-bold">ASSIKI SERVICES</h1>
      </div>
      <p class="text-white/80 text-sm">Recherchez-vous du personnel? </p>
    </div>

    

      <h2 class="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
        <i class="fas fa-user-plus text-accent"></i> Je cherche du personnel
      </h2>
      <p class="text-gray-500 text-sm mb-5">Vous avez besoin d'une ménagère, d'un chauffeur ? Publiez votre besoin</p>

      <form id="formRecruteurPersonnel" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Nom et prénom *</label>
          <input type="text" id="nom" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: Jean ADJANOHOUN">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Lieu du travail *</label>
          <input type="text" id="lieu" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: Cotonou, Calavi...">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Téléphone / WhatsApp *</label>
          <input type="tel" id="telephone" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: 229XXXXXXXX">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Type de personnel recherché *</label>
          <select id="type" required class="w-full px-4 py-3 border border-gray-200 rounded-xl">
            <option value="">-- Sélectionnez --</option>
            <option>Ménagère</option><option>Baby-sitter</option><option>Nourrice</option>
            <option>Chauffeur</option><option>Entretien</option><option>Fleuriste</option>
            <option>Jardinier</option><option>Gardien</option><option>Cuisinier</option><option>Autre</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Tranche d'âge</label>
            <select id="age" class="w-full px-4 py-3 border border-gray-200 rounded-xl">
              <option value="">-- Optionnel --</option>
              <option>18-25 ans</option><option>26-35 ans</option><option>36-45 ans</option>
              <option>46-55 ans</option><option>55 ans et +</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Ethnie</label>
            <select id="ethnie" class="w-full px-4 py-3 border border-gray-200 rounded-xl">
              <option value="">-- Optionnel --</option>
              <option>Adja</option><option>Fon</option><option>Goun</option>
              <option>Yoruba</option><option>Bariba</option><option>Dendi</option>
              <option>Peulh</option><option>Autre</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Description du poste</label>
          <textarea id="description" rows="3" class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Décrivez les tâches, horaires, conditions..."></textarea>
        </div>
        <button type="submit" class="w-full bg-accent text-white py-3 rounded-xl font-bold shadow-lg btn-submit mt-4">
          <i class="fas fa-paper-plane mr-2"></i> PUBLIER MA DEMANDE
        </button>
      </form>

      <div class="mt-6 text-center text-xs text-gray-400">
        <p>Votre demande sera traitée par notre équipe</p>
      </div>
    </div>

    <div class="bg-gray-100 p-4 text-center text-gray-500 text-xs">
      <p>© 2025 ASSIKI SERVICES - Agence de placement</p>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAgbEgBgsIzFfgbWm5C0zv6K0KbJOKstiY",
      authDomain: "jobs-bda0b.firebaseapp.com",
      projectId: "jobs-bda0b",
      storageBucket: "jobs-bda0b.firebasestorage.app",
      messagingSenderId: "867651853389",
      appId: "1:867651853389:web:9f1a66c0789584d9721004"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById("formRecruteurPersonnel").addEventListener("submit", async function(e) {
      e.preventDefault();

      const demande = {
        nom: document.getElementById("nom").value,
        lieu: document.getElementById("lieu").value,
        telephone: document.getElementById("telephone").value,
        type: document.getElementById("type").value,
        age: document.getElementById("age").value,
        ethnie: document.getElementById("ethnie").value,
        description: document.getElementById("description").value,
        date: new Date().toISOString(),
        statut: "En attente"
      };

      if (!demande.nom || !demande.lieu || !demande.telephone || !demande.type) {
        alert("Veuillez remplir tous les champs obligatoires (*)");
        return;
      }

      try {
        await db.collection("recruteurs_personnel").add(demande);
        alert("✅ Votre demande a été envoyée !");
        this.reset();
      } catch(error) {
        alert("❌ Une erreur s'est produite");
      }
    });
  </script>
</body>
</html>
