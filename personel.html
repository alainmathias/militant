<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASSIKI SERVICES - Demandes de personnel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a4a6f',
            secondary: '#0f2b3d',
            accent: '#e67e22',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #f3f4f6; }
    .demande-card { transition: all 0.3s ease; }
    .demande-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="font-sans">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-primary to-secondary p-5 text-white">
      <div class="flex items-center gap-3 mb-2">
        <i class="fas fa-handshake text-2xl text-accent"></i>
        <h1 class="text-xl font-bold">ASSIKI SERVICES</h1>
      </div>
      <p class="text-white/80 text-sm">Demandes de personnel</p>
    </div>

    <!-- Liste des demandes -->
    <div class="p-5">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
          <i class="fas fa-list text-accent"></i> Demandes récentes
        </h2>
        <a href="recruteur.html" class="bg-accent text-white px-3 py-1.5 rounded-xl text-sm font-semibold">
          <i class="fas fa-plus mr-1"></i> Publier
        </a>
      </div>

      <div id="demandesList" class="space-y-4">
        <div class="text-center py-8 text-gray-400">
          <i class="fas fa-spinner fa-spin"></i> Chargement...
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="bg-gray-100 p-4 text-center text-gray-500 text-xs">
      <p>© 2025 ASSIKI SERVICES - Agence de placement</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "assiki_demandes";

    function getDemandes() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('fr-FR');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function afficherDemandes() {
      const container = document.getElementById("demandesList");
      const demandes = getDemandes();

      if (demandes.length === 0) {
        container.innerHTML = `
          <div class="text-center py-10 text-gray-400">
            <i class="fas fa-inbox text-4xl mb-3"></i>
            <p>Aucune demande pour le moment</p>
            <a href="recruteur.html" class="text-accent text-sm font-semibold mt-2 inline-block">Soyez le premier à publier !</a>
          </div>
        `;
        return;
      }

      container.innerHTML = demandes.map(d => `
        <div class="bg-white rounded-xl p-4 shadow-sm border-l-4 border-accent demande-card">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-bold text-gray-800">${escapeHtml(d.nom)}</h3>
            <span class="text-[10px] text-gray-400 bg-gray-100 px-2 py-0.5 rounded">${formatDate(d.date)}</span>
          </div>
          
          <div class="space-y-1 text-sm">
            <p class="text-gray-600"><i class="fas fa-map-marker-alt text-accent w-5"></i> ${escapeHtml(d.lieu)}</p>
            <p class="text-gray-600"><i class="fas fa-briefcase text-accent w-5"></i> Recherche : <span class="font-semibold">${escapeHtml(d.type)}</span></p>
            ${d.age ? `<p class="text-gray-600"><i class="fas fa-calendar-alt text-accent w-5"></i> Âge souhaité : ${escapeHtml(d.age)}</p>` : ''}
            ${d.ethnie ? `<p class="text-gray-600"><i class="fas fa-users text-accent w-5"></i> Ethnie : ${escapeHtml(d.ethnie)}</p>` : ''}
          </div>
          
          <div class="mt-3 flex gap-2">
            <a href="https://wa.me/${escapeHtml(d.telephone)}?text=Bonjour%2C%20je%20suis%20intéressé%20par%20votre%20offre%20pour%20${escapeHtml(d.type)}" target="_blank" class="bg-green-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold inline-flex items-center gap-1">
              <i class="fab fa-whatsapp"></i> Contacter
            </a>
            <a href="tel:${escapeHtml(d.telephone)}" class="bg-accent text-white px-3 py-1.5 rounded-lg text-sm font-semibold inline-flex items-center gap-1">
              <i class="fas fa-phone-alt"></i> Appeler
            </a>
          </div>
        </div>
      `).join('');
    }

    // Initialiser avec des données d'exemple si vide
    function initExempleData() {
      let demandes = getDemandes();
      if (demandes.length === 0) {
        demandes = [
          {
            id: Date.now(),
            nom: "Marie HOUNGBO",
            lieu: "Cotonou - Haie Vive",
            telephone: "22997123456",
            type: "Ménagère",
            age: "26-35 ans",
            ethnie: "Fon",
            date: new Date().toISOString()
          },
          {
            id: Date.now() + 1,
            nom: "Paul DOSSOU",
            lieu: "Calavi - Hêvié",
            telephone: "22997876543",
            type: "Chauffeur",
            age: "36-45 ans",
            ethnie: "",
            date: new Date().toISOString()
          }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(demandes));
      }
    }

    initExempleData();
    afficherDemandes();
  </script>
</body>
</html>
