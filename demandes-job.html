<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASSIKI SERVICES - Offres d'emploi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a4a6f',
            secondary: '#0f2b3d',
            accent: '#e67e22',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #f3f4f6; }
    .offre-card { transition: all 0.3s ease; }
    .offre-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="font-sans">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">
    
    <div class="bg-gradient-to-r from-primary to-secondary p-5 text-white">
      <div class="flex items-center gap-3 mb-2">
        <i class="fas fa-handshake text-2xl text-accent"></i>
        <h1 class="text-xl font-bold">ASSIKI SERVICES</h1>
      </div>
      <p class="text-white/80 text-sm">Offres d'emploi</p>
    </div>

    <div class="p-5">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
          <i class="fas fa-list text-accent"></i> Offres récentes
        </h2>
        <a href="recruteur-job.html" class="bg-accent text-white px-3 py-1.5 rounded-xl text-sm font-semibold">
          <i class="fas fa-plus mr-1"></i> Publier
        </a>
      </div>

      <div class="flex gap-2 mb-4">
        <a href="demandes-personnel.html" class="flex-1 bg-gray-200 text-gray-600 py-1.5 rounded-lg text-center text-xs font-semibold">👤 Personnel</a>
        <a href="demandes-job.html" class="flex-1 bg-accent text-white py-1.5 rounded-lg text-center text-xs font-semibold">💼 Offres d'emploi</a>
      </div>

      <div id="offresList" class="space-y-4">
        <div class="text-center py-8 text-gray-400">
          <i class="fas fa-spinner fa-spin"></i> Chargement...
        </div>
      </div>
    </div>

    <div class="bg-gray-100 p-4 text-center text-gray-500 text-xs">
      <p>© 2025 ASSIKI SERVICES - Agence de placement</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "assiki_demandes_job";

    function getJobs() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('fr-FR');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function afficherOffres() {
      const container = document.getElementById("offresList");
      const offres = getJobs();

      if (offres.length === 0) {
        container.innerHTML = `
          <div class="text-center py-10 text-gray-400">
            <i class="fas fa-inbox text-4xl mb-3"></i>
            <p>Aucune offre d'emploi pour le moment</p>
            <a href="recruteur-job.html" class="text-accent text-sm font-semibold mt-2 inline-block">Soyez le premier à publier !</a>
          </div>
        `;
        return;
      }

      container.innerHTML = offres.map(o => `
        <div class="bg-white rounded-xl p-4 shadow-sm border-l-4 border-accent offre-card">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-bold text-gray-800">${escapeHtml(o.titre)}</h3>
            <span class="text-[10px] text-gray-400 bg-gray-100 px-2 py-0.5 rounded">${formatDate(o.date)}</span>
          </div>
          
          <div class="space-y-1 text-sm">
            <p class="text-gray-600"><i class="fas fa-building text-accent w-5"></i> ${escapeHtml(o.entreprise)}</p>
            <p class="text-gray-600"><i class="fas fa-map-marker-alt text-accent w-5"></i> ${escapeHtml(o.lieu)}</p>
            ${o.salaire ? `<p class="text-gray-600"><i class="fas fa-money-bill-wave text-accent w-5"></i> Salaire : <span class="font-semibold">${escapeHtml(o.salaire)}</span></p>` : ''}
            ${o.contrat ? `<p class="text-gray-600"><i class="fas fa-file-signature text-accent w-5"></i> Contrat : ${escapeHtml(o.contrat)}</p>` : ''}
            <p class="text-gray-500 text-xs mt-2">📝 ${escapeHtml(o.description.substring(0, 100))}${o.description.length > 100 ? '...' : ''}</p>
          </div>
          
          <div class="mt-3 flex gap-2">
            <a href="https://wa.me/${escapeHtml(o.telephone)}?text=Bonjour%2C%20je%20postule%20pour%20l'offre%20${escapeHtml(o.titre)}" target="_blank" class="bg-green-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold inline-flex items-center gap-1">
              <i class="fab fa-whatsapp"></i> Postuler
            </a>
            <a href="tel:${escapeHtml(o.telephone)}" class="bg-accent text-white px-3 py-1.5 rounded-lg text-sm font-semibold inline-flex items-center gap-1">
              <i class="fas fa-phone-alt"></i> Appeler
            </a>
          </div>
        </div>
      `).join('');
    }

    // Données d'exemple
    function initExempleData() {
      let offres = getJobs();
      if (offres.length === 0) {
        offres = [
          {
            id: Date.now(),
            typeAnnonce: "job",
            entreprise: "ASSIKI SERVICES",
            titre: "Ménagère expérimentée",
            lieu: "Cotonou",
            salaire: "50 000 FCFA/mois",
            contrat: "CDI",
            description: "Recherche ménagère pour entretien de bureaux. Horaires 8h-12h du lundi au vendredi.",
            profil: "Expérience en nettoyage professionnel requise.",
            telephone: "22997123456",
            email: "recrutement@assiki.com",
            date: new Date().toISOString()
          },
          {
            id: Date.now() + 1,
            typeAnnonce: "job",
            entreprise: "GROUPE ADJANOHOUN",
            titre: "Chauffeur particulier",
            lieu: "Calavi",
            salaire: "75 000 FCFA/mois",
            contrat: "CDD",
            description: "Chauffeur pour trajets quotidiens. Véhicule fourni.",
            profil: "Permis B, 3 ans d'expérience minimum.",
            telephone: "22997876543",
            email: "",
            date: new Date().toISOString()
          }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(offres));
      }
    }

    initExempleData();
    afficherOffres();
  </script>
</body>
</html>
