<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connexion - Base de données militants</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    body { 
        font-family: 'Inter', sans-serif; 
        background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%); 
        min-height: 100vh; 
    }
    .auth-card { 
        background: white; 
        border-radius: 32px; 
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
    }
    .notification-show { 
        animation: slideDown 0.3s ease-out; 
    }
    @keyframes slideDown { 
        from { opacity: 0; transform: translateY(-20px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
    .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #fea619;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>
<body class="flex items-center justify-center p-4">

<div class="max-w-md w-full mx-auto">
    <!-- Logo et titre -->
    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-[#fea619] rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
            <span class="material-symbols-outlined text-[#003525] text-4xl" style="font-variation-settings: 'FILL' 1;">reduce_capacity</span>
        </div>
        <h1 class="text-2xl font-black text-[#003525]">BASE DE DONNÉES</h1>
        <p class="text-gray-500 text-sm">Union Progressiste le Renouveau</p>
    </div>

    <!-- Carte de connexion -->
    <div class="auth-card p-8">
        <h2 class="text-2xl font-bold text-[#003525] mb-6 text-center">Connexion</h2>
        
        <div id="notification" class="hidden mb-4 rounded-xl p-3 text-sm notification-show"></div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nom d'utilisateur</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 text-lg">person</span>
                    <input type="text" id="username" class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#fea619] focus:border-[#fea619] transition" placeholder="admin / user" required>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 text-lg">lock</span>
                    <input type="password" id="password" class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#fea619] focus:border-[#fea619] transition" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-gray-300 text-[#fea619] focus:ring-[#fea619]">
                    <span class="text-sm text-gray-600">Se souvenir de moi</span>
                </label>
                <a href="#" onclick="showNotification('Contactez l\\'administrateur pour réinitialiser votre mot de passe', 'info')" class="text-sm text-[#fea619] hover:underline">Mot de passe oublié ?</a>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-[#fea619] hover:bg-[#e89510] text-[#003525] font-bold py-3 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">login</span>
                Se connecter
            </button>
        </form>
        
        <p class="text-center text-sm text-gray-500 mt-6">
            Pas encore de compte ? 
            <a href="register.html" class="text-[#fea619] font-semibold hover:underline">Créer un compte</a>
        </p>
        
        <div class="mt-4 pt-4 border-t border-gray-200">
            <p class="text-center text-xs text-gray-400">
                🔐 Comptes de démonstration :<br>
                <span class="font-semibold">admin</span> / admin123 | 
                <span class="font-semibold">user</span> / user123 | 
                <span class="font-semibold">jean</span> / jean123 | 
                <span class="font-semibold">marie</span> / marie123
            </p>
        </div>
    </div>
</div>

<script type="module">
    // ============================================
    // VARIABLES DES UTILISATEURS (sans rôle)
    // ============================================
    const USERS = [
        { username: "admin", password: "admin123", fullName: "Administrateur Principal", redirectPage: "dashboard_admin.html" },
        { username: "user", password: "user123", fullName: "Utilisateur Standard", redirectPage: "dashboard_user.html" },
        { username: "jean", password: "jean123", fullName: "Jean Dupont", redirectPage: "dashboard_user.html" },
        { username: "marie", password: "marie123", fullName: "Marie Koné", redirectPage: "dashboard_admin.html" }
    ];
    
    // ============================================
    // CODE DE LA PAGE
    // ============================================
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const notification = document.getElementById('notification');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const rememberMe = document.getElementById('rememberMe');
    
    // Vérifier si déjà connecté
    const savedUser = sessionStorage.getItem('user');
    if (savedUser) {
        try {
            const user = JSON.parse(savedUser);
            if (user && user.username) {
                window.location.href = user.redirectPage || 'dashboard.html';
            }
        } catch(e) {}
    }
    
    // Vérifier si "Se souvenir de moi" était coché
    const savedUsername = localStorage.getItem('savedUsername');
    if (savedUsername) {
        usernameInput.value = savedUsername;
        rememberMe.checked = true;
    }
    
    function showNotification(message, type) {
        const notif = notification;
        notif.classList.remove('hidden', 'bg-green-50', 'bg-red-50', 'bg-blue-50', 'border-green-200', 'border-red-200', 'border-blue-200', 'text-green-800', 'text-red-800', 'text-blue-800');
        
        if (type === 'success') {
            notif.classList.add('bg-green-50', 'border', 'border-green-200', 'text-green-800');
            notif.innerHTML = `<div class="flex items-center gap-2">
                <span class="material-symbols-outlined">check_circle</span>
                <span>${message}</span>
            </div>`;
        } else if (type === 'info') {
            notif.classList.add('bg-blue-50', 'border', 'border-blue-200', 'text-blue-800');
            notif.innerHTML = `<div class="flex items-center gap-2">
                <span class="material-symbols-outlined">info</span>
                <span>${message}</span>
            </div>`;
        } else {
            notif.classList.add('bg-red-50', 'border', 'border-red-200', 'text-red-800');
            notif.innerHTML = `<div class="flex items-center gap-2">
                <span class="material-symbols-outlined">error</span>
                <span>${message}</span>
            </div>`;
        }
        
        notif.classList.remove('hidden');
        
        setTimeout(() => {
            notif.classList.add('hidden');
        }, 4000);
    }
    
    // Fonction pour vérifier les identifiants
    function verifierIdentifiants(username, password) {
        const user = USERS.find(u => u.username.toLowerCase() === username.toLowerCase());
        
        if (!user) {
            return { success: false, message: "Nom d'utilisateur incorrect" };
        }
        
        if (user.password !== password) {
            return { success: false, message: "Mot de passe incorrect" };
        }
        
        return { 
            success: true, 
            user: {
                username: user.username,
                fullName: user.fullName,
                redirectPage: user.redirectPage
            }
        };
    }
    
    // Message de bienvenue personnalisé
    function getWelcomeMessage(fullName) {
        return `✅ Bienvenue ${fullName} ! Connexion réussie.`;
    }
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        
        if (!username || !password) {
            showNotification('Veuillez entrer votre nom d\'utilisateur et mot de passe', 'error');
            return;
        }
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Connexion...';
        
        setTimeout(() => {
            const resultat = verifierIdentifiants(username, password);
            
            if (resultat.success) {
                const redirectPage = resultat.user.redirectPage;
                const welcomeMessage = getWelcomeMessage(resultat.user.fullName);
                
                // Sauvegarder les infos utilisateur
                const userData = {
                    username: resultat.user.username,
                    fullName: resultat.user.fullName,
                    redirectPage: redirectPage,
                    loginTime: new Date().toISOString()
                };
                
                sessionStorage.setItem('user', JSON.stringify(userData));
                
                // Sauvegarder le nom d'utilisateur si "Se souvenir de moi" est coché
                if (rememberMe.checked) {
                    localStorage.setItem('savedUsername', username);
                } else {
                    localStorage.removeItem('savedUsername');
                }
                
                showNotification(welcomeMessage, 'success');
                
                setTimeout(() => {
                    window.location.href = redirectPage;
                }, 1500);
                
            } else {
                showNotification(resultat.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span class="material-symbols-outlined">login</span> Se connecter';
            }
        }, 800);
    });
    
    // Permettre la connexion avec la touche Entrée
    usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
</script>

</body>
      </html>
