<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASSIKI SERVICES - Je cherche du travail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a4a6f',
            secondary: '#0f2b3d',
            accent: '#e67e22',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #f3f4f6; }
    .btn-submit { transition: all 0.3s ease; }
    .btn-submit:hover { transform: scale(1.02); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15); }
  </style>
</head>
<body class="font-sans">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-primary to-secondary p-5 text-white">
      <div class="flex items-center gap-3 mb-2">
        <i class="fas fa-handshake text-2xl text-accent"></i>
        <h1 class="text-xl font-bold">ASSIKI SERVICES</h1>
      </div>
      <p class="text-white/80 text-sm">Je cherche du travail</p>
    </div>

    <!-- Formulaire -->
    <div class="p-5">
      <h2 class="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
        <i class="fas fa-user-graduate text-accent"></i> Déposez votre candidature
      </h2>
      <p class="text-gray-500 text-sm mb-5">Remplissez ce formulaire pour postuler aux offres d'emploi</p>

      <form id="formCandidat" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Nom et prénom *</label>
          <input type="text" id="nom" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-accent" placeholder="Ex: Jean ADJANOHOUN">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Ethnie</label>
          <select id="ethnie" class="w-full px-4 py-3 border border-gray-200 rounded-xl">
            <option value="">-- Sélectionnez --</option>
            <option>Adja</option>
            <option>Fon</option>
            <option>Goun</option>
            <option>Yoruba</option>
            <option>Bariba</option>
            <option>Dendi</option>
            <option>Peulh</option>
            <option>Autre</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Religion</label>
          <select id="religion" class="w-full px-4 py-3 border border-gray-200 rounded-xl">
            <option value="">-- Sélectionnez --</option>
            <option>Chrétien</option>
            <option>Musulman</option>
            <option>Vodoun</option>
            <option>Autre</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Âge *</label>
          <input type="number" id="age" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: 28">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Type de travail recherché *</label>
          <select id="typeTravail" required class="w-full px-4 py-3 border border-gray-200 rounded-xl">
            <option value="">-- Sélectionnez --</option>
            <option>Ménagère</option>
            <option>Baby-sitter</option>
            <option>Nourrice</option>
            <option>Chauffeur</option>
            <option>Entretien</option>
            <option>Fleuriste</option>
            <option>Jardinier</option>
            <option>Gardien</option>
            <option>Cuisinier</option>
            <option>Autre</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Avez-vous déjà fait ce travail ? *</label>
          <div class="flex gap-4 mt-1">
            <label class="flex items-center gap-2">
              <input type="radio" name="experience" value="Oui" required class="w-4 h-4 text-accent"> <span>Oui</span>
            </label>
            <label class="flex items-center gap-2">
              <input type="radio" name="experience" value="Non" required class="w-4 h-4 text-accent"> <span>Non</span>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Téléphone / WhatsApp *</label>
          <input type="tel" id="telephone" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: 229XXXXXXXX">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Disponibilité</label>
          <select id="disponibilite" class="w-full px-4 py-3 border border-gray-200 rounded-xl">
            <option value="">-- Sélectionnez --</option>
            <option>Immédiate</option>
            <option>Dans 1 semaine</option>
            <option>Dans 15 jours</option>
            <option>Dans 1 mois</option>
          </select>
        </div>

        <button type="submit" class="w-full bg-accent text-white py-3 rounded-xl font-bold shadow-lg btn-submit mt-4">
          <i class="fas fa-paper-plane mr-2"></i> ENVOYER MA CANDIDATURE
        </button>
      </form>

      <div class="mt-6 text-center text-xs text-gray-400">
        <p>Votre candidature sera étudiée par notre équipe</p>
      </div>
    </div>

    <div class="bg-gray-100 p-4 text-center text-gray-500 text-xs">
      <p>© 2025 ASSIKI SERVICES - Agence de placement</p>
    </div>
  </div>

  <script>
    // Configuration Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAgbEgBgsIzFfgbWm5C0zv6K0KbJOKstiY",
      authDomain: "jobs-bda0b.firebaseapp.com",
      projectId: "jobs-bda0b",
      storageBucket: "jobs-bda0b.firebasestorage.app",
      messagingSenderId: "867651853389",
      appId: "1:867651853389:web:9f1a66c0789584d9721004"
    };

    // Initialisation Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById("formCandidat").addEventListener("submit", async function(e) {
      e.preventDefault();

      const experience = document.querySelector('input[name="experience"]:checked');
      
      const candidat = {
        nom: document.getElementById("nom").value,
        ethnie: document.getElementById("ethnie").value,
        religion: document.getElementById("religion").value,
        age: parseInt(document.getElementById("age").value),
        typeTravail: document.getElementById("typeTravail").value,
        experience: experience ? experience.value : "",
        telephone: document.getElementById("telephone").value,
        disponibilite: document.getElementById("disponibilite").value,
        date: new Date().toISOString(),
        statut: "En attente"
      };

      if (!candidat.nom || !candidat.age || !candidat.typeTravail || !candidat.experience || !candidat.telephone) {
        alert("Veuillez remplir tous les champs obligatoires (*)");
        return;
      }

      try {
        await db.collection("candidats").add(candidat);
        alert("✅ Votre candidature a été envoyée avec succès !");
        this.reset();
      } catch(error) {
        console.error("Erreur:", error);
        alert("❌ Une erreur s'est produite. Veuillez réessayer.");
      }
    });
  </script>
</body>
</html>
