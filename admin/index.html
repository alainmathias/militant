<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASSIKI SERVICES - Administration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a4a6f',
            secondary: '#0f2b3d',
            accent: '#e67e22',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #f3f4f6; }
    .tab-btn.active { background-color: #e67e22; color: white; }
    .tab-btn:not(.active) { background-color: #e5e7eb; color: #4b5563; }
    .tab-btn:not(.active):hover { background-color: #d1d5db; }
  </style>
</head>
<body class="font-sans">

  <!-- ========== ÉCRAN DE CONNEXION ========== -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary to-secondary p-4">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center mx-auto mb-3">
          <i class="fas fa-handshake text-primary text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-primary">ASSIKI SERVICES</h1>
        <p class="text-gray-500 text-sm">Espace Administration</p>
      </div>
      
      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
          <input type="email" id="adminEmail" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-accent" placeholder="admin@assiki.com">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
          <input type="password" id="adminPassword" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-accent" placeholder="••••••••">
        </div>
        <button type="submit" class="w-full bg-accent text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition">
          <i class="fas fa-sign-in-alt mr-2"></i> Se connecter
        </button>
      </form>
      <div id="loginError" class="text-red-500 text-center mt-3 text-sm hidden"></div>
    </div>
  </div>

  <!-- ========== DASHBOARD ADMIN ========== -->
  <div id="dashboardScreen" class="hidden min-h-screen bg-gray-100">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-primary to-secondary text-white p-4 flex flex-wrap justify-between items-center sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <i class="fas fa-handshake text-accent text-2xl"></i>
        <div>
          <h1 class="text-xl font-bold">ASSIKI SERVICES</h1>
          <p class="text-white/70 text-xs">Tableau de bord administrateur</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm hidden md:inline" id="adminEmailDisplay"></span>
        <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-semibold transition">
          <i class="fas fa-sign-out-alt mr-1"></i> Déconnexion
        </button>
      </div>
    </div>

    <!-- Statistiques -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4">
      <div class="bg-white rounded-2xl p-4 shadow-sm stat-card">
        <div class="flex items-center justify-between mb-2">
          <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
            <i class="fas fa-user-tie text-blue-600 text-lg"></i>
          </div>
          <span class="text-2xl font-bold text-gray-800" id="statPersonnel">0</span>
        </div>
        <p class="text-gray-500 text-xs">Demandes personnel</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm stat-card">
        <div class="flex items-center justify-between mb-2">
          <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center">
            <i class="fas fa-users text-green-600 text-lg"></i>
          </div>
          <span class="text-2xl font-bold text-gray-800" id="statCandidats">0</span>
        </div>
        <p class="text-gray-500 text-xs">Candidatures</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm stat-card">
        <div class="flex items-center justify-between mb-2">
          <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center">
            <i class="fas fa-briefcase text-purple-600 text-lg"></i>
          </div>
          <span class="text-2xl font-bold text-gray-800" id="statOffres">0</span>
        </div>
        <p class="text-gray-500 text-xs">Offres d'emploi</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm stat-card">
        <div class="flex items-center justify-between mb-2">
          <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center">
            <i class="fas fa-clock text-orange-600 text-lg"></i>
          </div>
          <span class="text-2xl font-bold text-gray-800" id="statEnAttente">0</span>
        </div>
        <p class="text-gray-500 text-xs">En attente</p>
      </div>
    </div>

    <!-- Onglets -->
    <div class="flex flex-wrap gap-2 px-4 pb-2">
      <button class="tab-btn active px-5 py-2.5 rounded-xl font-semibold transition" data-tab="personnel">
        <i class="fas fa-user-tie mr-2"></i> Demandes Personnel
      </button>
      <button class="tab-btn px-5 py-2.5 rounded-xl font-semibold transition" data-tab="candidats">
        <i class="fas fa-users mr-2"></i> Candidatures
      </button>
      <button class="tab-btn px-5 py-2.5 rounded-xl font-semibold transition" data-tab="offres">
        <i class="fas fa-briefcase mr-2"></i> Offres d'emploi
      </button>
      <button class="tab-btn px-5 py-2.5 rounded-xl font-semibold transition" data-tab="videos">
        <i class="fas fa-video mr-2"></i> Vidéos
      </button>
    </div>

    <!-- Conteneur Demandes Personnel -->
    <div id="personnelContainer" class="p-4 space-y-3">
      <div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
    </div>

    <!-- Conteneur Candidatures -->
    <div id="candidatsContainer" class="p-4 space-y-3 hidden">
      <div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
    </div>

    <!-- Conteneur Offres d'emploi -->
    <div id="offresContainer" class="p-4 space-y-3 hidden">
      <div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
    </div>

    <!-- Conteneur Vidéos -->
    <div id="videosContainer" class="p-4 space-y-4 hidden">
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-gray-800"><i class="fas fa-plus-circle text-accent mr-2"></i> Ajouter une vidéo</h3>
        </div>
        <form id="addVideoForm" class="space-y-3">
          <input type="text" id="videoTitle" placeholder="Titre de la vidéo" required class="w-full px-4 py-3 border border-gray-200 rounded-xl">
          <input type="url" id="videoUrl" placeholder="Lien YouTube (ex: https://youtu.be/... ou https://youtube.com/watch?v=...)" required class="w-full px-4 py-3 border border-gray-200 rounded-xl">
          <textarea id="videoDescription" rows="2" placeholder="Description (optionnel)" class="w-full px-4 py-3 border border-gray-200 rounded-xl"></textarea>
          <button type="submit" class="bg-accent text-white px-5 py-2 rounded-xl font-semibold hover:bg-orange-600 transition">
            <i class="fas fa-save mr-1"></i> Publier la vidéo
          </button>
        </form>
      </div>
      <div id="videosList" class="space-y-3">
        <div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
      </div>
    </div>
  </div>

  <script>
    // ========== CONFIGURATION FIREBASE ==========
    const firebaseConfig = {
      apiKey: "AIzaSyAgbEgBgsIzFfgbWm5C0zv6K0KbJOKstiY",
      authDomain: "jobs-bda0b.firebaseapp.com",
      projectId: "jobs-bda0b",
      storageBucket: "jobs-bda0b.firebasestorage.app",
      messagingSenderId: "867651853389",
      appId: "1:867651853389:web:9f1a66c0789584d9721004"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Références collections
    const personnelCol = db.collection("recruteurs_personnel");
    const candidatsCol = db.collection("candidats");
    const offresCol = db.collection("recruteurs_job");
    const videosCol = db.collection("videos");

    // État courant
    let currentUser = null;

    // ========== FONCTIONS UTILITAIRES ==========
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('fr-FR');
    }

    // Extraire l'ID YouTube
    function getYouTubeId(url) {
      if (!url) return null;
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    // ========== MISES À JOUR DES STATISTIQUES ==========
    async function updateStats() {
      try {
        const [personnel, candidats, offres] = await Promise.all([
          personnelCol.get(),
          candidatsCol.get(),
          offresCol.get()
        ]);
        
        let enAttente = 0;
        personnel.forEach(d => { if(d.data().statut === "En attente") enAttente++; });
        candidats.forEach(d => { if(d.data().statut === "En attente") enAttente++; });
        offres.forEach(d => { if(d.data().statut === "En attente") enAttente++; });
        
        document.getElementById("statPersonnel").innerText = personnel.size;
        document.getElementById("statCandidats").innerText = candidats.size;
        document.getElementById("statOffres").innerText = offres.size;
        document.getElementById("statEnAttente").innerText = enAttente;
      } catch(e) { console.error("Stats error:", e); }
    }

    // ========== AFFICHAGE DEMANDES PERSONNEL ==========
    async function loadPersonnel() {
      const container = document.getElementById("personnelContainer");
      container.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';
      
      try {
        const snapshot = await personnelCol.orderBy("date", "desc").get();
        if (snapshot.empty) {
          container.innerHTML = '<div class="text-center py-8 text-gray-400">Aucune demande de personnel</div>';
          return;
        }
        
        container.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          container.innerHTML += `
            <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 ${data.statut === 'En attente' ? 'border-accent' : 'border-green-500'}">
              <div class="flex flex-wrap justify-between items-start gap-2 mb-3">
                <h3 class="font-bold text-gray-800 text-lg">${escapeHtml(data.nom)}</h3>
                <span class="text-xs bg-gray-100 px-2 py-1 rounded">${formatDate(data.date)}</span>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm mb-4">
                <p><i class="fas fa-map-marker-alt text-accent w-5"></i> ${escapeHtml(data.lieu)}</p>
                <p><i class="fas fa-briefcase text-accent w-5"></i> ${escapeHtml(data.type)}</p>
                <p><i class="fas fa-calendar-alt text-accent w-5"></i> ${data.age || '-'}</p>
                <p><i class="fas fa-users text-accent w-5"></i> ${data.ethnie || '-'}</p>
                <p class="md:col-span-2"><i class="fas fa-phone text-accent w-5"></i> ${escapeHtml(data.telephone)}</p>
                ${data.description ? `<p class="md:col-span-2 text-gray-500 text-xs"><i class="fas fa-align-left text-accent w-5"></i> ${escapeHtml(data.description.substring(0, 150))}${data.description.length > 150 ? '...' : ''}</p>` : ''}
              </div>
              <div class="flex flex-wrap gap-2">
                <a href="https://wa.me/${escapeHtml(data.telephone)}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fab fa-whatsapp mr-1"></i> Contacter</a>
                ${data.statut === 'En attente' ? `<button onclick="updateStatut('recruteurs_personnel', '${doc.id}', 'Traité')" class="bg-accent text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-check mr-1"></i> Marquer traité</button>` : `<span class="bg-green-100 text-green-600 px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-check-circle mr-1"></i> Traité</span>`}
                <button onclick="deleteItem('recruteurs_personnel', '${doc.id}')" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-trash mr-1"></i> Supprimer</button>
              </div>
            </div>
          `;
        });
        await updateStats();
      } catch(e) { container.innerHTML = `<div class="text-center py-8 text-red-400">Erreur: ${e.message}</div>`; }
    }

    // ========== AFFICHAGE CANDIDATURES ==========
    async function loadCandidats() {
      const container = document.getElementById("candidatsContainer");
      container.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';
      
      try {
        const snapshot = await candidatsCol.orderBy("date", "desc").get();
        if (snapshot.empty) {
          container.innerHTML = '<div class="text-center py-8 text-gray-400">Aucune candidature</div>';
          return;
        }
        
        container.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          container.innerHTML += `
            <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 ${data.statut === 'En attente' ? 'border-accent' : 'border-green-500'}">
              <div class="flex flex-wrap justify-between items-start gap-2 mb-3">
                <h3 class="font-bold text-gray-800 text-lg">${escapeHtml(data.nom)}</h3>
                <span class="text-xs bg-gray-100 px-2 py-1 rounded">${formatDate(data.date)}</span>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm mb-4">
                <p><i class="fas fa-briefcase text-accent w-5"></i> ${escapeHtml(data.typeTravail)}</p>
                <p><i class="fas fa-calendar-alt text-accent w-5"></i> ${data.age} ans</p>
                <p><i class="fas fa-users text-accent w-5"></i> ${data.ethnie || '-'}</p>
                <p><i class="fas fa-pray text-accent w-5"></i> ${data.religion || '-'}</p>
                <p><i class="fas fa-check-circle text-accent w-5"></i> Expérience: ${data.experience}</p>
                <p class="md:col-span-2"><i class="fas fa-phone text-accent w-5"></i> ${escapeHtml(data.telephone)}</p>
              </div>
              <div class="flex flex-wrap gap-2">
                <a href="https://wa.me/${escapeHtml(data.telephone)}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fab fa-whatsapp mr-1"></i> Contacter</a>
                ${data.statut === 'En attente' ? `<button onclick="updateStatut('candidats', '${doc.id}', 'Traité')" class="bg-accent text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-check mr-1"></i> Marquer traité</button>` : `<span class="bg-green-100 text-green-600 px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-check-circle mr-1"></i> Traité</span>`}
                <button onclick="deleteItem('candidats', '${doc.id}')" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-trash mr-1"></i> Supprimer</button>
              </div>
            </div>
          `;
        });
        await updateStats();
      } catch(e) { container.innerHTML = `<div class="text-center py-8 text-red-400">Erreur: ${e.message}</div>`; }
    }

    // ========== AFFICHAGE OFFRES D'EMPLOI ==========
    async function loadOffres() {
      const container = document.getElementById("offresContainer");
      container.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';
      
      try {
        const snapshot = await offresCol.orderBy("date", "desc").get();
        if (snapshot.empty) {
          container.innerHTML = '<div class="text-center py-8 text-gray-400">Aucune offre d\'emploi</div>';
          return;
        }
        
        container.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          container.innerHTML += `
            <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 ${data.statut === 'En attente' ? 'border-accent' : 'border-green-500'}">
              <div class="flex flex-wrap justify-between items-start gap-2 mb-3">
                <h3 class="font-bold text-gray-800 text-lg">${escapeHtml(data.titre)}</h3>
                <span class="text-xs bg-gray-100 px-2 py-1 rounded">${formatDate(data.date)}</span>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm mb-4">
                <p><i class="fas fa-building text-accent w-5"></i> ${escapeHtml(data.entreprise)}</p>
                <p><i class="fas fa-map-marker-alt text-accent w-5"></i> ${escapeHtml(data.lieu)}</p>
                <p><i class="fas fa-money-bill-wave text-accent w-5"></i> ${data.salaire || '-'}</p>
                <p><i class="fas fa-file-signature text-accent w-5"></i> ${data.contrat || '-'}</p>
                <p class="md:col-span-2"><i class="fas fa-phone text-accent w-5"></i> ${escapeHtml(data.telephone)}</p>
                ${data.email ? `<p class="md:col-span-2"><i class="fas fa-envelope text-accent w-5"></i> ${escapeHtml(data.email)}</p>` : ''}
                <p class="md:col-span-2 text-gray-500 text-xs"><i class="fas fa-align-left text-accent w-5"></i> ${escapeHtml(data.description.substring(0, 200))}${data.description.length > 200 ? '...' : ''}</p>
              </div>
              <div class="flex flex-wrap gap-2">
                <a href="https://wa.me/${escapeHtml(data.telephone)}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fab fa-whatsapp mr-1"></i> Contacter</a>
                ${data.statut === 'En attente' ? `<button onclick="updateStatut('recruteurs_job', '${doc.id}', 'Traité')" class="bg-accent text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-check mr-1"></i> Marquer traité</button>` : `<span class="bg-green-100 text-green-600 px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-check-circle mr-1"></i> Traité</span>`}
                <button onclick="deleteItem('recruteurs_job', '${doc.id}')" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fas fa-trash mr-1"></i> Supprimer</button>
              </div>
            </div>
          `;
        });
        await updateStats();
      } catch(e) { container.innerHTML = `<div class="text-center py-8 text-red-400">Erreur: ${e.message}</div>`; }
    }

    // ========== GESTION VIDÉOS ==========
    async function loadVideos() {
      const container = document.getElementById("videosList");
      container.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';
      
      try {
        const snapshot = await videosCol.orderBy("date", "desc").get();
        if (snapshot.empty) {
          container.innerHTML = '<div class="text-center py-8 text-gray-400">Aucune vidéo</div>';
          return;
        }
        
        container.innerHTML = "";
        snapshot.forEach(doc => {
          const video = doc.data();
          const youtubeId = getYouTubeId(video.url);
          const embedHtml = youtubeId ? `<iframe class="w-full h-48 rounded-xl" src="https://www.youtube.com/embed/${youtubeId}" frameborder="0" allowfullscreen></iframe>` : `<video class="w-full rounded-xl" controls src="${video.url}"></video>`;
          
          container.innerHTML += `
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm">
              <div class="relative">
                ${embedHtml}
                <button onclick="deleteVideo('${doc.id}')" class="absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-600 transition">
                  <i class="fas fa-trash text-sm"></i>
                </button>
              </div>
              <div class="p-4">
                <h3 class="font-bold text-gray-800">${escapeHtml(video.title)}</h3>
                <p class="text-gray-500 text-sm mt-1">${escapeHtml(video.description || '')}</p>
                <p class="text-gray-400 text-xs mt-2">Publié le ${formatDate(video.date)}</p>
              </div>
            </div>
          `;
        });
      } catch(e) { container.innerHTML = `<div class="text-center py-8 text-red-400">Erreur: ${e.message}</div>`; }
    }

    // ========== ACTIONS ADMIN ==========
    window.updateStatut = async (collection, id, newStatut) => {
      try {
        await db.collection(collection).doc(id).update({ statut: newStatut });
        alert("✅ Statut mis à jour");
        refreshCurrentTab();
      } catch(e) { alert("❌ Erreur: " + e.message); }
    };

    window.deleteItem = async (collection, id) => {
      if (confirm("Êtes-vous sûr de vouloir supprimer cet élément ?")) {
        try {
          await db.collection(collection).doc(id).delete();
          alert("✅ Élément supprimé");
          refreshCurrentTab();
          updateStats();
        } catch(e) { alert("❌ Erreur: " + e.message); }
      }
    };

    window.deleteVideo = async (id) => {
      if (confirm("Supprimer cette vidéo ?")) {
        try {
          await videosCol.doc(id).delete();
          alert("✅ Vidéo supprimée");
          loadVideos();
        } catch(e) { alert("❌ Erreur: " + e.message); }
      }
    };

    // Formulaire ajout vidéo
    document.getElementById("addVideoForm")?.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = document.getElementById("videoTitle").value;
      const url = document.getElementById("videoUrl").value;
      const description = document.getElementById("videoDescription").value;
      
      if (!title || !url) {
        alert("Veuillez remplir le titre et l'URL");
        return;
      }
      
      try {
        await videosCol.add({
          title: title,
          url: url,
          description: description,
          date: new Date().toISOString()
        });
        alert("✅ Vidéo ajoutée !");
        document.getElementById("addVideoForm").reset();
        loadVideos();
      } catch(e) { alert("❌ Erreur: " + e.message); }
    });

    // ========== GESTION DES ONGLETS ==========
    let currentTab = "personnel";
    
    function refreshCurrentTab() {
      if (currentTab === "personnel") loadPersonnel();
      else if (currentTab === "candidats") loadCandidats();
      else if (currentTab === "offres") loadOffres();
      else if (currentTab === "videos") loadVideos();
    }
    
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        
        currentTab = btn.getAttribute("data-tab");
        
        document.getElementById("personnelContainer").classList.add("hidden");
        document.getElementById("candidatsContainer").classList.add("hidden");
        document.getElementById("offresContainer").classList.add("hidden");
        document.getElementById("videosContainer").classList.add("hidden");
        
        document.getElementById(`${currentTab}Container`).classList.remove("hidden");
        refreshCurrentTab();
      });
    });
