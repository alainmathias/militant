<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASSIKI SERVICES - Offres d'emploi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1a4a6f', secondary: '#0f2b3d', accent: '#e67e22' }
        }
      }
    }
  </script>
  <style>
    body { background: #f3f4f6; }
    .sidebar { transition: transform 0.3s ease-in-out; }
    .sidebar-mobile { transform: translateX(-100%); }
    .sidebar-mobile.open { transform: translateX(0); }
    @media (min-width: 768px) { .sidebar-mobile { transform: translateX(0) !important; } }
    .offre-card { transition: all 0.3s ease; }
    .offre-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="font-sans overflow-x-hidden">

<div class="min-h-screen flex overflow-x-hidden">
  
  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar sidebar-mobile fixed md:relative z-30 w-72 bg-gradient-to-b from-primary to-secondary h-full shadow-2xl transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center"><i class="fas fa-handshake text-primary text-xl"></i></div>
        <div><h2 class="text-white font-bold text-xl">ASSIKI SERVICES</h2><p class="text-white/50 text-xs">Agence de placement</p></div>
      </div>
    </div>
    <nav class="p-4 space-y-2">
      <a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:bg-white/10 transition"><i class="fas fa-tachometer-alt w-5"></i><span>Tableau de bord</span></a>
      <a href="recruteur-personnel.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:bg-white/10 transition"><i class="fas fa-user-tie w-5"></i><span>Recherche du Personnel</span></a>
      <a href="recruteur-job.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:bg-white/10 transition"><i class="fas fa-briefcase w-5"></i><span>Recherche de Jobs</span></a>
      <a href="offres.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl bg-white/10 text-white transition"><i class="fas fa-eye w-5"></i><span>Nos offres d'emploi</span></a>
      <div class="border-t border-white/20 my-2"></div>
      <a href="parcours.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:bg-white/10 transition"><i class="fas fa-history w-5"></i><span>Notre parcours</span></a>
      <a href="presentation.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:bg-white/10 transition"><i class="fas fa-align-left w-5"></i><span>Presentation de ASSIKI-SERVICES</span></a>
    </nav>
    <div class="absolute bottom-5 left-0 right-0 p-4 border-t border-white/10 bg-primary/30">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center"><i class="fas fa-user text-white"></i></div>
        <div class="flex-1"><p class="text-white text-sm font-medium">Admin</p><p class="text-white/40 text-xs">assiki@services.com</p></div>
        <i class="fas fa-sign-out-alt text-white/40"></i>
      </div>
    </div>
  </div>

  <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

  <!-- CONTENU PRINCIPAL -->
  <div class="flex-1 min-h-screen overflow-x-hidden w-full">
    <div class="md:hidden bg-white px-4 py-3 flex items-center justify-between shadow-sm sticky top-0 z-10">
      <button id="menuBtn" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center"><i class="fas fa-bars text-primary text-lg"></i></button>
      <div class="flex items-center gap-2"><div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center"><i class="fas fa-handshake text-primary text-sm"></i></div><span class="font-bold text-lg text-primary">ASSIKI SERVICES</span></div>
      <div class="w-10"></div>
    </div>

    <div class="p-5 md:p-6">
      <div class="bg-gradient-to-r from-primary to-secondary rounded-2xl p-5 text-white mb-6">
        <h1 class="text-xl font-bold flex items-center gap-2"><i class="fas fa-eye"></i> Offres d'emploi</h1>
        <p class="text-white/80 text-sm mt-1">Découvrez les dernières opportunités</p>
      </div>

      <div id="offresContainer" class="space-y-4">
        <div class="text-center py-10 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAgbEgBgsIzFfgbWm5C0zv6K0KbJOKstiY",
    authDomain: "jobs-bda0b.firebaseapp.com",
    projectId: "jobs-bda0b",
    storageBucket: "jobs-bda0b.firebasestorage.app",
    messagingSenderId: "867651853389",
    appId: "1:867651853389:web:9f1a66c0789584d9721004"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  async function loadOffres() {
    const container = document.getElementById("offresContainer");
    try {
      const snapshot = await db.collection("recruteurs_job").orderBy("date", "desc").get();
      if (snapshot.empty) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400"><i class="fas fa-inbox text-4xl mb-3 block"></i><p>Aucune offre pour le moment</p></div>';
        return;
      }
      container.innerHTML = "";
      snapshot.forEach(doc => {
        const offre = doc.data();
        container.innerHTML += `
          <div class="bg-white rounded-2xl p-5 shadow-sm offre-card border-l-4 border-accent">
            <div class="flex justify-between items-start mb-2">
              <h3 class="font-bold text-gray-800 text-lg">${escapeHtml(offre.titre)}</h3>
              <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded">${new Date(offre.date).toLocaleDateString()}</span>
            </div>
            <div class="space-y-2 text-sm">
              <p><i class="fas fa-building text-accent w-5"></i> ${escapeHtml(offre.entreprise)}</p>
              <p><i class="fas fa-map-marker-alt text-accent w-5"></i> ${escapeHtml(offre.lieu)}</p>
              ${offre.salaire ? `<p><i class="fas fa-money-bill-wave text-accent w-5"></i> Salaire : ${escapeHtml(offre.salaire)}</p>` : ''}
              ${offre.contrat ? `<p><i class="fas fa-file-signature text-accent w-5"></i> Contrat : ${escapeHtml(offre.contrat)}</p>` : ''}
              <p class="text-gray-600 mt-2">${escapeHtml(offre.description)}</p>
              ${offre.profil ? `<p class="text-gray-500 text-xs mt-1"><span class="font-semibold">Profil recherché :</span> ${escapeHtml(offre.profil)}</p>` : ''}
            </div>
            <div class="mt-4 flex gap-3">
              <a href="https://wa.me/${escapeHtml(offre.telephone)}?text=Bonjour%2C%20je%20postule%20pour%20l'offre%20${escapeHtml(offre.titre)}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-semibold inline-flex items-center gap-2"><i class="fab fa-whatsapp"></i> Postuler</a>
              <a href="tel:${escapeHtml(offre.telephone)}" class="bg-accent text-white px-4 py-2 rounded-xl text-sm font-semibold inline-flex items-center gap-2"><i class="fas fa-phone-alt"></i> Appeler</a>
            </div>
          </div>
        `;
      });
    } catch(e) { container.innerHTML = '<div class="text-center py-10 text-red-400">Erreur de chargement</div>'; }
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

  const sidebar = document.getElementById("sidebar"), overlay = document.getElementById("sidebarOverlay"), menuBtn = document.getElementById("menuBtn");
  menuBtn?.addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("hidden"); });
  overlay?.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.add("hidden"); });

  loadOffres();
</script>
</body>
</html>
