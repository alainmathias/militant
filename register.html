<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inscription - Base de données militants</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%); min-height: 100vh; }
    .auth-card { background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    .notification-show { animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="flex items-center justify-center p-4">

<div class="max-w-md w-full mx-auto">
    <!-- Logo et titre -->
    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-[#fea619] rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
            <span class="material-symbols-outlined text-[#003525] text-4xl" style="font-variation-settings: 'FILL' 1;">reduce_capacity</span>
        </div>
        <h1 class="text-2xl font-black text-[#003525]">BASE DE DONNÉES</h1>
        <p class="text-gray-500 text-sm">Union Progressiste le Renouveau</p>
    </div>

    <!-- Carte d'inscription -->
    <div class="auth-card p-8">
        <h2 class="text-2xl font-bold text-[#003525] mb-6 text-center">Créer un compte</h2>
        
        <div id="notification" class="hidden mb-4 rounded-xl p-3 text-sm notification-show"></div>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nom complet</label>
                <input type="text" id="fullName" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#fea619] focus:border-[#fea619] transition" placeholder="Jean Dupont" required>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input type="email" id="email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#fea619] focus:border-[#fea619] transition" placeholder="jean@exemple.com" required>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Téléphone</label>
                <input type="tel" id="phone" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#fea619] focus:border-[#fea619] transition" placeholder="01 99 44 14 85">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
                <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#fea619] focus:border-[#fea619] transition" placeholder="••••••••" required>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#fea619] focus:border-[#fea619] transition" placeholder="••••••••" required>
            </div>
            
            <div class="flex items-center gap-2">
                <input type="checkbox" id="isAdmin" class="w-4 h-4 rounded border-gray-300 text-[#fea619] focus:ring-[#fea619]">
                <label class="text-sm text-gray-600">Créer un compte administrateur</label>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-[#fea619] hover:bg-[#e89510] text-[#003525] font-bold py-3 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">person_add</span>
                S'inscrire
            </button>
        </form>
        
        <p class="text-center text-sm text-gray-500 mt-6">
            Déjà un compte ? 
            <a href="login.html" class="text-[#fea619] font-semibold hover:underline">Se connecter</a>
        </p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANFTV1IIKeMi9FXUCm7824wybRiESuO9U",
        authDomain: "militant-eed81.firebaseapp.com",
        projectId: "militant-eed81",
        storageBucket: "militant-eed81.appspot.com",
        messagingSenderId: "705643782444",
        appId: "1:705643782444:web:7a07c0c80f3306dc8f0c89"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const notification = document.getElementById('notification');

    function showNotification(message, type) {
        notification.classList.remove('hidden', 'bg-green-50', 'bg-red-50', 'border-green-200', 'border-red-200', 'text-green-800', 'text-red-800');
        notification.classList.add(type === 'success' ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800', 'border');
        notification.innerHTML = `<div class="flex items-center gap-2"><span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'error'}</span><span>${message}</span></div>`;
        setTimeout(() => notification.classList.add('hidden'), 5000);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const isAdmin = document.getElementById('isAdmin').checked;
        
        if (password !== confirmPassword) {
            showNotification('Les mots de passe ne correspondent pas', 'error');
            return;
        }
        
        if (password.length < 6) {
            showNotification('Le mot de passe doit contenir au moins 6 caractères', 'error');
            return;
        }
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Inscription...';
        
        try {
            // Créer l'utilisateur dans Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            // Mettre à jour le profil
            await updateProfile(user, { displayName: fullName });
            
            // Enregistrer les infos supplémentaires dans Firestore
            await setDoc(doc(db, "users", user.uid), {
                fullName: fullName,
                email: email,
                phone: phone,
                role: isAdmin ? 'administrateur' : 'lecteur',
                createdAt: new Date(),
                isActive: true
            });
            
            showNotification('✅ Compte créé avec succès ! Redirection...', 'success');
            
            // Stocker les infos en session
            sessionStorage.setItem('user', JSON.stringify({
                uid: user.uid,
                fullName: fullName,
                email: email,
                role: isAdmin ? 'administrateur' : 'lecteur'
            }));
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
            
        } catch (error) {
            console.error(error);
            let message = 'Erreur lors de l\'inscription';
            if (error.code === 'auth/email-already-in-use') message = 'Cet email est déjà utilisé';
            if (error.code === 'auth/invalid-email') message = 'Email invalide';
            if (error.code === 'auth/weak-password') message = 'Mot de passe trop faible';
            showNotification(message, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span class="material-symbols-outlined">person_add</span> S\'inscrire';
        }
    });
</script>

<style>
    .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #fea619;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</body>
                                                                                           </html>
