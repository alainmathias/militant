<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#003525] backdrop-blur-xl shadow-lg flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<a href="dashboard.html" class="text-emerald-50 active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<span class="text-xl font-black text-[#fea619] tracking-widest font-manrope">
      Ajouter un militant 
</span>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-[#fea619] bg-gray-300 flex items-center justify-center">
<img src="img/file_000000003d1871f8bf29e606a536d279.png" class="material-symbols-outlined text-white">
</div>
</header>

<main class="mt-20 px-4 max-w-lg mx-auto">
<!-- Header Section -->
<div class="mb-8">
<h1 class="text-3xl font-extrabold text-primary tracking-tight mb-2">Ajouter un militant</h1>
<p class="text-on-surface-variant font-medium">Remplissez les informations pour enregistrer un nouveau membre.</p>
</div>

<!-- Notification Area -->
<div id="notification" class="hidden mb-4 rounded-xl p-4 notification-show"></div>

<!-- Form Card -->
<form id="militantForm" enctype="multipart/form-data">
<div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden border border-outline-variant/15 mb-8">
<div class="p-6 space-y-6">
<!-- Photo Capture Section -->
<div class="space-y-3">
<label class="block text-xs font-bold uppercase tracking-widest text-primary/70 font-label">CIP (Photo)</label>
<div id="uploadZone" class="relative group cursor-pointer border-2 border-dashed border-outline-variant rounded-xl aspect-video bg-surface-container-low flex flex-col items-center justify-center transition-all hover:border-secondary-container hover:bg-secondary-container/5">
<span class="material-symbols-outlined text-4xl text-primary mb-2">photo_camera</span>
<span class="text-sm font-semibold text-primary">Prendre une photo de la carte</span>
<span class="text-xs text-on-surface-variant mt-1">Format JPG, PNG supporté</span>
<input type="file" name="carte_image" id="carte_image" accept="image/*" capture="environment" class="hidden">
</div>
<div id="previewContainer" class="hidden mt-3">
<div class="relative inline-block w-full">
<img id="imagePreview" class="preview-image w-full" alt="Aperçu">
<button type="button" id="clearImageBtn" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm hover:bg-red-600 shadow-lg">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>
</div>

<!-- Personal Info Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant font-label" for="prenom">Prénom *</label>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg py-3 px-4 text-on-surface placeholder:text-outline-variant transition-all" id="prenom" name="prenom" placeholder="Jean" type="text" required/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant font-label" for="nom">Nom *</label>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg py-3 px-4 text-on-surface placeholder:text-outline-variant transition-all" id="nom" name="nom" placeholder="Dupont" type="text" required/>
</div>
</div>

<!-- Contact & Location -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant font-label" for="telephone">Téléphone *</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-sm">call</span>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg py-3 pl-11 pr-4 text-on-surface placeholder:text-outline-variant transition-all" id="telephone" name="telephone" placeholder="01 99 44 14 85" type="tel" required/>
</div>
</div>

<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant font-label" for="quartier">Quartier</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-sm">location_on</span>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg py-3 pl-11 pr-4 text-on-surface placeholder:text-outline-variant transition-all" id="quartier" name="quartier" placeholder="KLOUEKANMEY" type="text"/>
</div>
</div>

<!-- Voter Info -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant font-label" for="carte_electeur">Numéro Carte électeur</label>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg py-3 px-4 text-on-surface placeholder:text-outline-variant transition-all" id="carte_electeur" name="carte_electeur" placeholder="Numéro d'identification" type="text"/>
</div>

<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant font-label" for="centre_vote">Centre de vote</label>

<button type="submit" id="submitBtn" class="w-full bg-[#fea619] hover:bg-[#e89510] text-primary font-bold py-5 px-6 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 group mb-10">
<span class="text-lg">Enregistrer</span>
<span class="material-symbols-outlined font-bold group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>

<!-- BottomNavBar -->


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    query, 
    where, 
    getDocs,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyANFTV1IIKeMi9FXUCm7824wybRiESuO9U",
    authDomain: "militant-eed81.firebaseapp.com",
    projectId: "militant-eed81",
    storageBucket: "militant-eed81.appspot.com",
    messagingSenderId: "705643782444",
    appId: "1:705643782444:web:7a07c0c80f3306dc8f0c89"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 CONFIG CLOUDINARY
const CLOUD_NAME = "djnqwtapp";
const UPLOAD_PRESET = "militant"; // ⚠️ crée-le dans Cloudinary

// 📷 IMAGE
let selectedImage = null;

// DOM
const uploadZone = document.getElementById('uploadZone');
const carteImage = document.getElementById('carte_image');
const previewContainer = document.getElementById('previewContainer');
const imagePreview = document.getElementById('imagePreview');
const clearImageBtn = document.getElementById('clearImageBtn');
const form = document.getElementById('militantForm');
const submitBtn = document.getElementById('submitBtn');
const notification = document.getElementById('notification');

// CLICK UPLOAD
uploadZone.addEventListener('click', () => carteImage.click());

// PREVIEW IMAGE
carteImage.addEventListener('change', (e) => {
    const file = e.target.files[0];

    if (file) {
        // 🔒 Limite taille 5MB
        if (file.size > 5 * 1024 * 1024) {
            showNotification('Image trop lourde (max 5MB)', 'error');
            return;
        }

        selectedImage = file;

        const reader = new FileReader();
        reader.onload = (event) => {
            imagePreview.src = event.target.result;
            previewContainer.classList.remove('hidden');
            uploadZone.classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }
});

// CLEAR IMAGE
clearImageBtn.addEventListener('click', () => {
    selectedImage = null;
    carteImage.value = '';
    previewContainer.classList.add('hidden');
    uploadZone.classList.remove('hidden');
    imagePreview.src = '';
});

// NOTIFICATION
function showNotification(message, type) {
    notification.classList.remove('hidden', 'bg-green-50', 'bg-red-50');

    if (type === 'success') {
        notification.classList.add('bg-green-50');
    } else {
        notification.classList.add('bg-red-50');
    }

    notification.innerText = message;

    setTimeout(() => {
        notification.classList.add('hidden');
    }, 4000);
}

// 🚀 UPLOAD CLOUDINARY
async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (!data.secure_url) {
        throw new Error("Erreur upload Cloudinary");
    }

    return data.secure_url;
}

// SUBMIT
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const nom = document.getElementById('nom').value.trim();
    const prenom = document.getElementById('prenom').value.trim();
    const telephone = document.getElementById('telephone').value.trim();
    const quartier = document.getElementById('quartier').value;
    const carteElecteur = document.getElementById('carte_electeur').value;
    const centreVote = document.getElementById('centre_vote').value;
    const responsable = document.getElementById('responsable').value;

    if (!nom || !prenom || !telephone) {
        showNotification('Veuillez remplir les champs obligatoires', 'error');
        return;
    }

    try {
        // 🔍 Vérifier doublon
        const militantsRef = collection(db, 'militants');
        const q = query(militantsRef, where('telephone', '==', telephone));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            showNotification('❌ Ce militant existe déjà', 'error');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '⏳ Enregistrement...';

        let imageUrl = null;

        // 📷 Upload Cloudinary
        if (selectedImage) {
            imageUrl = await uploadToCloudinary(selectedImage);
        }

        // 💾 Enregistrer Firestore
        await addDoc(collection(db, 'militants'), {
            nom: nom.toUpperCase(),
            prenom: prenom.toUpperCase(),
            telephone,
            quartier: quartier || '',
            carte_electeur: carteElecteur || '',
            centre_vote: centreVote || '',
            responsable: responsable || '',
            carte_electeur_image: imageUrl,
            statut: 'actif',
            cotisation_a_jour: false,
            date_inscription: serverTimestamp(),
            created_at: serverTimestamp()
        });

        showNotification('✅ Militant ajouté avec succès', 'success');

        form.reset();
        clearImageBtn.click();

        setTimeout(() => {
            window.location.href = 'list.html';
        }, 1500);

    } catch (error) {
        console.error(error);
        showNotification(error.message, 'error');

        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Enregistrer';
    }
});
</script>
</body>
  </html>
