<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASSIKI SERVICES - Offres d'emploi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a4a6f',
            secondary: '#0f2b3d',
            accent: '#e67e22',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #f3f4f6; }
    .btn-submit { transition: all 0.3s ease; }
    .btn-submit:hover { transform: scale(1.02); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15); }
  </style>
</head>
<body class="font-sans">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-primary to-secondary p-5 text-white">
      <div class="flex items-center gap-3 mb-2">
        <i class="fas fa-handshake text-2xl text-accent"></i>
        <h1 class="text-xl font-bold">ASSIKI SERVICES</h1>
      </div>
      <p class="text-white/80 text-sm">Offres d'emploi / Jobs</p>
    </div>

    <!-- Formulaire -->
    <div class="p-5">
      <div class="flex gap-3 mb-5">
        <a href="personnel.html" class="flex-1 bg-gray-200 text-gray-600 py-2 rounded-xl text-center font-bold text-sm">👤 Personnel</a>
        <a href="job.html" class="flex-1 bg-accent text-white py-2 rounded-xl text-center font-bold text-sm">💼 Offre d'emploi</a>
      </div>

      <h2 class="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
        <i class="fas fa-briefcase text-accent"></i> Je publie une offre d'emploi
      </h2>
      <p class="text-gray-500 text-sm mb-5">Vous cherchez à recruter un employé ? Publiez votre offre ici</p>

      <form id="formRecruteurJob" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Nom de l'entreprise / Recruteur *</label>
          <input type="text" id="entreprise" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: ASSIKI SERVICES, Jean ADJANOHOUN...">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Titre du poste *</label>
          <input type="text" id="titre" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: Ménagère, Chauffeur, Baby-sitter...">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Lieu du travail *</label>
          <input type="text" id="lieu" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: Cotonou, Calavi, Porto-Novo...">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Salaire proposé</label>
          <input type="text" id="salaire" class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: 50 000 - 75 000 FCFA / mois">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Type de contrat</label>
          <select id="contrat" class="w-full px-4 py-3 border border-gray-200 rounded-xl">
            <option value="">-- Sélectionnez --</option>
            <option>CDI</option>
            <option>CDD</option>
            <option>Intérim</option>
            <option>Stage</option>
            <option>Freelance</option>
            <option>Temps partiel</option>
            <option>Temps plein</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Description du poste / Missions *</label>
          <textarea id="description" rows="3" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Décrivez les missions, horaires, conditions, profils recherchés..."></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Profil recherché</label>
          <textarea id="profil" rows="2" class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Expérience, compétences, formation..."></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Téléphone / WhatsApp pour postuler *</label>
          <input type="tel" id="telephone" required class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: 229XXXXXXXX">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email pour candidature</label>
          <input type="email" id="email" class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="Ex: recrutement@assiki.com">
        </div>

        <button type="submit" class="w-full bg-accent text-white py-3 rounded-xl font-bold shadow-lg btn-submit mt-4">
          <i class="fas fa-paper-plane mr-2"></i> PUBLIER L'OFFRE
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="demandes-job.html" class="text-accent text-sm font-semibold">
          <i class="fas fa-eye mr-1"></i> Voir les offres d'emploi
        </a>
      </div>
    </div>

    <div class="bg-gray-100 p-4 text-center text-gray-500 text-xs">
      <p>© 2025 ASSIKI SERVICES - Agence de placement</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "assiki_demandes_job";

    function getJobs() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    function saveJobs(jobs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
    }

    document.getElementById("formRecruteurJob").addEventListener("submit", function(e) {
      e.preventDefault();

      const nouvelleOffre = {
        id: Date.now(),
        typeAnnonce: "job",
        entreprise: document.getElementById("entreprise").value,
        titre: document.getElementById("titre").value,
        lieu: document.getElementById("lieu").value,
        salaire: document.getElementById("salaire").value,
        contrat: document.getElementById("contrat").value,
        description: document.getElementById("description").value,
        profil: document.getElementById("profil").value,
        telephone: document.getElementById("telephone").value,
        email: document.getElementById("email").value,
        date: new Date().toISOString()
      };

      if (!nouvelleOffre.entreprise || !nouvelleOffre.titre || !nouvelleOffre.lieu || !nouvelleOffre.description || !nouvelleOffre.telephone) {
        alert("Veuillez remplir tous les champs obligatoires (*)");
        return;
      }

      const jobs = getJobs();
      jobs.unshift(nouvelleOffre);
      saveJobs(jobs);

      alert("✅ Votre offre d'emploi a été publiée !");
      this.reset();
      window.location.href = "demandes-job.html";
    });
  </script>
</body>
</html>
